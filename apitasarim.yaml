openapi: 3.0.3
info:
  title: Dijital İlaç Dolabı ve Reçete Yönetim API'si
  version: 1.0.0
  description: >
    Bu API, kullanıcıların sisteme kayıt olup giriş yapmasını, profil bilgilerini yönetmesini,
    evlerinde bulunan ilaçları dijital olarak takip etmesini ve reçetelerini sisteme ekleyip
    yönetmesini sağlayan RESTful bir servistir. API JWT tabanlı kimlik doğrulama ile korunmaktadır.
  

servers:
  - url: https://api.example.com
    description: Production sunucusu
  - url: https://staging-api.example.com
    description: Staging sunucusu
  - url: http://localhost:3000
    description: Local development sunucusu

tags:
  - name: Auth
    description: Kayıt olma ve giriş yapma işlemleri
  - name: Users
    description: Kullanıcı profil yönetimi işlemleri
  - name: Medications
    description: Kullanıcının ilaç dolabı yönetimi işlemleri
  - name: Prescriptions
    description: Reçete yönetimi işlemleri

paths:
  api/auth/register:
    post:
      tags:
        - Auth
      summary: Üye ol
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bu email adresi ile kayıtlı kullanıcı zaten var
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  api/auth/login:
    post:
      tags:
        - Auth
      summary: Giriş yap
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Email veya şifre hatalı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  api/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: Kullanıcının benzersiz kimlik numarası
        schema:
          type: string
        example: usr_12345

    get:
      tags:
        - Users
      summary: Profil görüntüle
      operationId: getUserProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Kullanıcı profili başarıyla getirildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu kullanıcı bilgilerini görüntüleme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Users
      summary: Profil güncelle
      operationId: updateUserProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateInput"
      responses:
        "200":
          description: Kullanıcı profili başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu kullanıcıyı güncelleme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email adresi başka bir kullanıcı tarafından kullanılıyor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Users
      summary: Hesap sil
      operationId: deleteUserAccount
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Kullanıcı hesabı başarıyla silindi
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu kullanıcıyı silme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Kullanıcı bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  api/medications:
    get:
      tags:
        - Medications
      summary: Kullanıcının tüm ilaçlarını listele
      operationId: listMedications
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Sayfa numarası
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          required: false
          description: Sayfa başına sonuç sayısı
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
      responses:
        "200":
          description: İlaçlar başarıyla listelendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationListResponse"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - Medications
      summary: İlaç ekle
      operationId: addMedication
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationInput"
      responses:
        "201":
          description: İlaç başarıyla eklendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  api/medications/{medicationId}:
    parameters:
      - name: medicationId
        in: path
        required: true
        description: İlacın benzersiz kimlik numarası
        schema:
          type: string
        example: med_12345

    get:
      tags:
        - Medications
      summary: Tek bir ilacı görüntüle
      operationId: getMedication
      security:
        - BearerAuth: []
      responses:
        "200":
          description: İlaç bilgisi başarıyla getirildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu ilacı görüntüleme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: İlaç bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Medications
      summary: İlaç bilgilerini güncelle
      operationId: updateMedication
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationInput"
      responses:
        "200":
          description: İlaç başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu ilacı güncelleme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: İlaç bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Medications
      summary: İlaç sil
      operationId: deleteMedication
      security:
        - BearerAuth: []
      responses:
        "204":
          description: İlaç başarıyla silindi
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu ilacı silme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: İlaç bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  api/prescriptions:
    get:
      tags:
        - Prescriptions
      summary: Kullanıcının tüm reçetelerini listele
      operationId: listPrescriptions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Sayfa numarası
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          required: false
          description: Sayfa başına sonuç sayısı
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
      responses:
        "200":
          description: Reçeteler başarıyla listelendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionListResponse"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - Prescriptions
      summary: Reçete ekle
      operationId: addPrescription
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionInput"
      responses:
        "201":
          description: Reçete başarıyla eklendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  api/prescriptions/{prescriptionId}:
    parameters:
      - name: prescriptionId
        in: path
        required: true
        description: Reçetenin benzersiz kimlik numarası
        schema:
          type: string
        example: pre_12345

    get:
      tags:
        - Prescriptions
      summary: Tek bir reçeteyi görüntüle
      operationId: getPrescription
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Reçete başarıyla getirildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu reçeteyi görüntüleme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reçete bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Prescriptions
      summary: Reçete bilgilerini güncelle
      operationId: updatePrescription
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionInput"
      responses:
        "200":
          description: Reçete başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu reçeteyi güncelleme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reçete bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Prescriptions
      summary: Reçete sil
      operationId: deletePrescription
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Reçete başarıyla silindi
        "401":
          description: Kimlik doğrulama başarısız
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bu reçeteyi silme yetkiniz yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reçete bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT tabanlı kimlik doğrulama. Authorization başlığına Bearer token eklenmelidir.

  schemas:
    RegisterInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
          example: Can
        lastName:
          type: string
          minLength: 2
          maxLength: 50
          example: Yılmaz
        email:
          type: string
          format: email
          example: can@example.com
        phone:
          type: string
          example: "05551234567"
        password:
          type: string
          format: password
          minLength: 6
          example: StrongPass123
      required:
        - firstName
        - lastName
        - email
        - password

    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
          example: can@example.com
        password:
          type: string
          format: password
          example: StrongPass123
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: İşlem başarılı
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: "#/components/schemas/User"
      required:
        - message
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: string
          example: usr_12345
        firstName:
          type: string
          example: Can
        lastName:
          type: string
          example: Yılmaz
        email:
          type: string
          format: email
          example: can@example.com
        phone:
          type: string
          example: "05551234567"
        role:
          type: string
          enum:
            - user
            - admin
          example: user
        accountStatus:
          type: string
          enum:
            - active
            - passive
            - suspended
          example: active
        createdAt:
          type: string
          format: date-time
          example: "2026-03-09T10:30:00Z"
      required:
        - id
        - firstName
        - lastName
        - email
        - role
        - accountStatus
        - createdAt

    UserUpdateInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
          example: Can
        lastName:
          type: string
          minLength: 2
          maxLength: 50
          example: Demir
        email:
          type: string
          format: email
          example: can.demir@example.com
        phone:
          type: string
          example: "05559876543"
      required:
        - firstName
        - lastName
        - email

    Medication:
      type: object
      properties:
        id:
          type: string
          example: med_12345
        userId:
          type: string
          example: usr_12345
        medicationName:
          type: string
          example: Parol
        boxCount:
          type: integer
          minimum: 1
          example: 2
        unitsPerBox:
          type: integer
          minimum: 1
          example: 20
        expirationDate:
          type: string
          format: date
          example: "2026-12-31"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-09T11:00:00Z"
      required:
        - id
        - userId
        - medicationName
        - boxCount
        - unitsPerBox
        - expirationDate
        - createdAt

    MedicationInput:
      type: object
      properties:
        medicationName:
          type: string
          minLength: 2
          maxLength: 100
          example: Parol
        boxCount:
          type: integer
          minimum: 1
          example: 2
        unitsPerBox:
          type: integer
          minimum: 1
          example: 20
        expirationDate:
          type: string
          format: date
          example: "2026-12-31"
      required:
        - medicationName
        - boxCount
        - unitsPerBox
        - expirationDate

    MedicationListResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 2
        data:
          type: array
          items:
            $ref: "#/components/schemas/Medication"
      required:
        - page
        - limit
        - total
        - data

    PrescriptionMedication:
      type: object
      properties:
        medicationName:
          type: string
          example: Parol
        dosage:
          type: string
          example: Günde 2 kez 1 tablet
        duration:
          type: string
          example: 5 gün
      required:
        - medicationName

    Prescription:
      type: object
      properties:
        id:
          type: string
          example: pre_12345
        userId:
          type: string
          example: usr_12345
        doctorName:
          type: string
          example: Dr. Ayşe Kaya
        prescriptionDate:
          type: string
          format: date
          example: "2026-03-01"
        notes:
          type: string
          example: Yemekten sonra kullanılmalıdır.
        medications:
          type: array
          items:
            $ref: "#/components/schemas/PrescriptionMedication"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-09T11:15:00Z"
      required:
        - id
        - userId
        - prescriptionDate
        - medications
        - createdAt

    PrescriptionInput:
      type: object
      properties:
        doctorName:
          type: string
          minLength: 2
          maxLength: 100
          example: Dr. Ayşe Kaya
        prescriptionDate:
          type: string
          format: date
          example: "2026-03-01"
        notes:
          type: string
          maxLength: 500
          example: Yemekten sonra kullanılmalıdır.
        medications:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PrescriptionMedication"
      required:
        - prescriptionDate
        - medications

    PrescriptionListResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 3
        data:
          type: array
          items:
            $ref: "#/components/schemas/Prescription"
      required:
        - page
        - limit
        - total
        - data

    Error:
      type: object
      properties:
        message:
          type: string
          example: Geçersiz istek
      required:
        - message