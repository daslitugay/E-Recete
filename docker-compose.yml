services:
  mongodb:
    image: mongo:7
    container_name: e-recete-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - e-recete-network

  redis:
    image: redis:7-alpine
    container_name: e-recete-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - e-recete-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: e-recete-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - e-recete-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: e-recete-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/e_recete
      MONGO_RETRY_COUNT: 10
      MONGO_RETRY_DELAY_MS: 3000
      JWT_SECRET: docker_dev_secret_change_later
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
      ADMIN_NAME: Admin
      ADMIN_EMAIL: admin@erecete.com
      ADMIN_PASSWORD: 123456
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 200
      AUTH_RATE_LIMIT_MAX: 20
      REDIS_URL: redis://redis:6379
      REDIS_RETRY_COUNT: 10
      REDIS_RETRY_DELAY_MS: 3000
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE: e_recete.events
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - e-recete-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: e-recete-worker
    restart: unless-stopped
    command: node src/workers/prescriptionWorker.js
    environment:
      MONGO_URI: mongodb://mongodb:27017/e_recete
      MONGO_RETRY_COUNT: 10
      MONGO_RETRY_DELAY_MS: 3000
      NODE_ENV: development
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE: e_recete.events
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - e-recete-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: e-recete-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - e-recete-network

volumes:
  mongodb_data:

networks:
  e-recete-network:
    driver: bridge